<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Cloud Practitioner CLF-C02 — Practice Exam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    --aws-orange: #FF9900;
    --aws-dark: #232F3E;
    --aws-blue: #1A73E8;
    --bg: #F4F6F9;
    --card: #FFFFFF;
    --border: #E1E6ED;
    --text: #1A1F2E;
    --muted: #6B7280;
    --correct: #10B981;
    --incorrect: #EF4444;
    --selected: #EBF5FF;
    --selected-border: #1A73E8;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--aws-dark);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--aws-orange);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    color: var(--aws-dark);
    font-family: 'IBM Plex Mono', monospace;
  }

  .logo-text {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .logo-sub {
    color: var(--aws-orange);
    font-size: 12px;
    font-weight: 500;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat-chip {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 6px 14px;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
  }

  .stat-chip span {
    color: var(--aws-orange);
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 64px);
  }

  /* ── Sidebar ── */
  aside {
    background: var(--aws-dark);
    padding: 20px;
    overflow-y: auto;
    height: calc(100vh - 64px);
    position: sticky;
    top: 64px;
    width:fit-content
  }

  .sidebar-title {
    color: var(--aws-orange);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .q-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
  }

  .q-dot {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.4);
    border: none;
  }

  .q-dot:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .q-dot.current { background: var(--aws-orange); color: var(--aws-dark); }
  .q-dot.answered { background: rgba(16,185,129,0.25); color: #10B981; }
  .q-dot.wrong { background: rgba(239,68,68,0.25); color: #EF4444; }

  /* Filter / controls */
  .sidebar-controls {
    margin-top: 20px;
  }

  .mode-btn {
    width: 100%;
    padding: 9px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    margin-bottom: 6px;
  }

  .mode-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .mode-btn.active { background: var(--aws-orange); color: var(--aws-dark); border-color: var(--aws-orange); font-weight: 600; }

  /* ── Main ── */
  main {
    padding: 32px;
    max-width: 800px;
    margin: auto;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 24px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--aws-orange), #FFB74D);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* Question card */
  .q-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .q-num {
    background: var(--aws-dark);
    color: var(--aws-orange);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: 0.05em;
  }

  .q-topic {
    background: rgba(26, 115, 232, 0.1);
    color: var(--aws-blue);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .q-text {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 28px;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    border-radius: 10px;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    background: #fff;
  }

  .option:hover:not(.disabled) {
    border-color: var(--selected-border);
    background: var(--selected);
  }

  .option.selected {
    border-color: var(--selected-border);
    background: var(--selected);
  }

  .option.correct {
    border-color: var(--correct);
    background: rgba(16,185,129,0.06);
  }

  .option.incorrect {
    border-color: var(--incorrect);
    background: rgba(239,68,68,0.06);
  }

  .option.show-correct {
    border-color: var(--correct);
    background: rgba(16,185,129,0.06);
  }

  .opt-letter {
    width: 28px;
    height: 28px;
    min-width: 28px;
    border-radius: 7px;
    background: #F0F2F5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    transition: all 0.15s;
  }

  .option.selected .opt-letter { background: var(--aws-blue); color: #fff; }
  .option.correct .opt-letter { background: var(--correct); color: #fff; }
  .option.incorrect .opt-letter { background: var(--incorrect); color: #fff; }
  .option.show-correct .opt-letter { background: var(--correct); color: #fff; }

  .opt-text {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    padding-top: 4px;
  }

  /* Actions */
  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    gap: 12px;
  }

  .btn {
    padding: 11px 24px;
    border-radius: 9px;
    border: none;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .btn-primary {
    background: var(--aws-orange);
    color: var(--aws-dark);
  }
  .btn-primary:hover { background: #e88800; }

  .btn-secondary {
    background: transparent;
    border: 2px solid var(--border);
    color: var(--muted);
  }
  .btn-secondary:hover { border-color: var(--aws-dark); color: var(--aws-dark); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    padding: 11px 14px;
  }
  .btn-ghost:hover { color: var(--text); }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Feedback */
  .feedback {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeIn 0.2s ease;
  }

  .feedback.show { display: block; }
  .feedback.correct { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); color: #065F46; }
  .feedback.incorrect { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: #7F1D1D; }

  .feedback-title {
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  /* Score summary */
  .summary-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 40px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: none;
    animation: fadeIn 0.3s ease;
  }

  .summary-card.show { display: block; }

  .score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: conic-gradient(var(--aws-orange) var(--pct), #E5E7EB 0deg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    position: relative;
  }

  .score-inner {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-pct {
    font-size: 28px;
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--aws-dark);
  }

  .score-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }

  .summary-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .summary-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .summary-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 32px;
  }

  .ss-item { text-align: center; }
  .ss-val {
    font-size: 28px;
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
  }
  .ss-val.green { color: var(--correct); }
  .ss-val.red { color: var(--incorrect); }
  .ss-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Responsive */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    main { padding: 16px; max-width: 100%; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">AWS</div>
    <div>
      <div class="logo-text">Cloud Practitioner</div>
      <div class="logo-sub">CLF-C02 Practice Exam</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-chip">Questions: <span id="hdr-total">225</span></div>
    <div class="stat-chip">Score: <span id="hdr-score">0/0</span></div>
    <div class="stat-chip">Accuracy: <span id="hdr-acc">—</span></div>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-title">Question Navigator</div>
    <div class="q-grid" id="q-grid"></div>

    <div class="sidebar-controls">
      <div class="sidebar-title" style="margin-top:20px">Mode</div>
      <button class="mode-btn active" id="mode-quiz" onclick="setMode('quiz')">📝 Quiz Mode</button>
      <button class="mode-btn" id="mode-study" onclick="setMode('study')">📖 Study Mode</button>
      <button class="mode-btn" id="mode-random" onclick="shuffleQuestions()">🔀 Shuffle Questions</button>
      <button class="mode-btn" style="margin-top:12px;background:rgba(239,68,68,0.1);color:#EF4444;border-color:rgba(239,68,68,0.2)" onclick="resetAll()">↺ Reset All</button>
    </div>
  </aside>

  <main>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="prog-label">Question <b>1</b> of 225</span>
        <span id="prog-pct">0% complete</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="q-card" id="q-card">
      <div class="q-meta">
        <span class="q-num" id="q-num">Q#1</span>
        <span class="q-topic">Topic 1</span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <div class="feedback-title" id="fb-title"></div>
        <div id="fb-body"></div>
      </div>
      <div class="actions">
        <button class="btn btn-secondary" onclick="navigate(-1)" id="btn-prev">← Prev</button>
        <button class="btn btn-ghost" id="btn-submit" onclick="submitAnswer()">Check Answer</button>
        <button class="btn btn-primary" onclick="navigate(1)" id="btn-next">Next →</button>
      </div>
    </div>

    <div class="summary-card" id="summary">
      <div class="score-circle" id="score-circle">
        <div class="score-inner">
          <div class="score-pct" id="score-pct">0%</div>
          <div class="score-label">Score</div>
        </div>
      </div>
      <div class="summary-title" id="sum-title">Quiz Complete!</div>
      <div class="summary-sub" id="sum-sub"></div>
      <div class="summary-stats">
        <div class="ss-item"><div class="ss-val green" id="sum-correct">0</div><div class="ss-label">Correct</div></div>
        <div class="ss-item"><div class="ss-val red" id="sum-wrong">0</div><div class="ss-label">Incorrect</div></div>
        <div class="ss-item"><div class="ss-val" id="sum-skip" style="color:var(--muted)">0</div><div class="ss-label">Skipped</div></div>
      </div>
      <button class="btn btn-primary" onclick="restartQuiz()" style="margin:0 auto;display:flex">↺ Restart Quiz</button>
    </div>
  </main>
</div>

<script>
const QUESTIONS = [{"num": 1, "question": "A company plans to use an Amazon Snowball Edge device to transfer files to the AWS Cloud. Which activities related to a Snowball Edge device are available to the company at no cost?", "options": {"A": "Use of the Snowball Edge appliance for a 10-day period", "B": "The transfer of data out of Amazon S3 and to the Snowball Edge appliance", "C": "The transfer of data from the Snowball Edge appliance into Amazon S3", "D": "Daily use of the Snowball Edge appliance after 10 days"}, "correct": "C"}, {"num": 2, "question": "A company has deployed applications on Amazon EC2 instances. The company needs to assess application vulnerabilities and must identify infrastructure deployments that do not meet best practices. Which AWS service can the company use to meet these requirements?", "options": {"A": "AWS Trusted Advisor", "B": "Amazon Inspector", "C": "AWS Config", "D": "Amazon GuardDuty"}, "correct": "B"}, {"num": 3, "question": "A company has a centralized group of users with large file storage requirements that have exceeded the space available on premises. The company wants to extend its file storage capabilities for this group while retaining the performance benefit of sharing content locally. What is the MOST operationally efficient AWS solution for this scenario?", "options": {"A": "Create an Amazon S3 bucket for each user. Mount each bucket by using an S3 file system mounting utility.", "B": "Configure and deploy an AWS Storage Gateway file gateway. Connect each user\u2019s workstation to the file gateway.", "C": "Move each user\u2019s working environment to Amazon WorkSpaces. Set up an Amazon WorkDocs account for each user.", "D": "Deploy an Amazon EC2 instance and attach an Amazon Elastic Block Store (Amazon EBS) Provisioned IOPS volume. Share the EBS volume directly with the users."}, "correct": "B"}, {"num": 4, "question": "According to security best practices, how should an Amazon EC2 instance be given access to an Amazon S3 bucket?", "options": {"A": "Hard code an IAM user\u2019s secret key and access key directly in the application, and upload the file.", "B": "Store the IAM user\u2019s secret key and access key in a text file on the EC2 instance, read the keys, then upload the file.", "C": "Have the EC2 instance assume a role to obtain the privileges to upload the file.", "D": "Modify the S3 bucket policy so that any service can upload to it at any time."}, "correct": "C"}, {"num": 5, "question": "Which option is a customer responsibility when using Amazon DynamoDB under the AWS Shared Responsibility Model?", "options": {"A": "Physical security of DynamoDB", "B": "Patching of DynamoDB", "C": "Access to DynamoDB tables", "D": "Encryption of data at rest in DynamoDB"}, "correct": "C"}, {"num": 6, "question": "Which option is a perspective that includes foundational capabilities of the AWS Cloud Adoption Framework (AWS CAF)?", "options": {"A": "Sustainability", "B": "Performance efficiency", "C": "Governance", "D": "Reliability"}, "correct": "C"}, {"num": 7, "question": "A company is running and managing its own Docker environment on Amazon EC2 instances. The company wants an alternative to help manage cluster size, scheduling, and environment maintenance. Which AWS service meets these requirements?", "options": {"A": "AWS Lambda", "B": "Amazon RDS", "C": "AWS Fargate", "D": "Amazon Athena"}, "correct": "C"}, {"num": 8, "question": "A company wants to run a NoSQL database on Amazon EC2 instances. Which task is the responsibility of AWS in this scenario?", "options": {"A": "Update the guest operating system of the EC2 instances.", "B": "Maintain high availability at the database layer.", "C": "Patch the physical infrastructure that hosts the EC2 instances.", "D": "Configure the security group firewall."}, "correct": "C"}, {"num": 9, "question": "Which AWS services or tools can identify rightsizing opportunities for Amazon EC2 instances? (Choose two.)", "options": {"A": "AWS Cost Explorer", "B": "AWS Billing Conductor", "C": "Amazon CodeGuru", "D": "Amazon SageMaker E. AWS Compute Optimizer"}, "correct": "A"}, {"num": 10, "question": "Which of the following are benefits of using AWS Trusted Advisor? (Choose two.)", "options": {"A": "Providing high-performance container orchestration", "B": "Creating and rotating encryption keys", "C": "Detecting underutilized resources to save costs", "D": "Improving security by proactively monitoring the AWS environment E. Implementing enforced tagging across AWS resources"}, "correct": "C"}, {"num": 11, "question": "Which of the following is an advantage that users experience when they move on-premises workloads to the AWS Cloud?", "options": {"A": "Elimination of expenses for running and maintaining data centers", "B": "Price discounts that are identical to discounts from hardware providers", "C": "Distribution of all operational controls to AWS", "D": "Elimination of operational expenses"}, "correct": "A"}, {"num": 12, "question": "A company wants to manage deployed IT services and govern its infrastructure as code (IaC) templates. Which AWS service will meet this requirement?", "options": {"A": "AWS Resource Explorer", "B": "AWS Service Catalog", "C": "AWS Organizations", "D": "AWS Systems Manager"}, "correct": "B"}, {"num": 13, "question": "Which AWS service or tool helps users visualize, understand, and manage spending and usage over time?", "options": {"A": "AWS Organizations", "B": "AWS Pricing Calculator", "C": "AWS Cost Explorer", "D": "AWS Service Catalog"}, "correct": "C"}, {"num": 14, "question": "A company is using a central data platform to manage multiple types of data for its customers. The company wants to use AWS services to discover, transform, and visualize the data. Which combination of AWS services should the company use to meet these requirements? (Choose two.)", "options": {"A": "AWS Glue", "B": "Amazon Elastic File System (Amazon EFS)", "C": "Amazon Redshift", "D": "Amazon QuickSight E. Amazon Quantum Ledger Database (Amazon QLDB)"}, "correct": "A"}, {"num": 15, "question": "A global company wants to migrate its third-party applications to the AWS Cloud. The company wants help from a global team of experts to complete the migration faster and more reliably in accordance with AWS internal best practices. Which AWS service or resource will meet these requirements?", "options": {"A": "AWS Support", "B": "AWS Professional Services", "C": "AWS Launch Wizard", "D": "AWS Managed Services (AMS)"}, "correct": "B"}, {"num": 16, "question": "An e-learning platform needs to run an application for 2 months each year. The application will be deployed on Amazon EC2 instances. Any application downtime during those 2 months must be avoided. Which EC2 purchasing option will meet these requirements MOST cost-effectively?", "options": {"A": "Reserved Instances", "B": "Dedicated Hosts", "C": "Spot Instances", "D": "On-Demand Instances"}, "correct": "D"}, {"num": 17, "question": "A developer wants to deploy an application quickly on AWS without manually creating the required resources. Which AWS service will meet these requirements?", "options": {"A": "Amazon EC2", "B": "AWS Elastic Beanstalk", "C": "AWS CodeBuild", "D": "Amazon Personalize"}, "correct": "B"}, {"num": 18, "question": "A company is storing sensitive customer data in an Amazon S3 bucket. The company wants to protect the data from accidental deletion or overwriting. Which S3 feature should the company use to meet these requirements?", "options": {"A": "S3 Lifecycle rules", "B": "S3 Versioning", "C": "S3 bucket policies", "D": "S3 server-side encryption"}, "correct": "B"}, {"num": 19, "question": "Which AWS service provides the ability to manage infrastructure as code?", "options": {"A": "AWS CodePipeline", "B": "AWS CodeDeploy", "C": "AWS Direct Connect", "D": "AWS CloudFormation"}, "correct": "D"}, {"num": 20, "question": "An online gaming company needs to choose a purchasing option to run its Amazon const state = {
  questions: [...QUESTIONS],
  current: 0,
  answers: {},    // index → chosen letter
  revealed: {},   // index → true if answer revealed
  mode: 'quiz',
};

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function setMode(m) {
  state.mode = m;
  document.getElementById('mode-quiz').classList.toggle('active', m === 'quiz');
  document.getElementById('mode-study').classList.toggle('active', m === 'study');
  renderQuestion();
}

function shuffleQuestions() {
  shuffle(state.questions);
  state.current = 0;
  state.answers = {};
  state.revealed = {};
  renderGrid();
  renderQuestion();
}

function resetAll() {
  if (!confirm('Reset all answers and start over?')) return;
  state.questions = [...QUESTIONS];
  state.current = 0;
  state.answers = {};
  state.revealed = {};
  renderGrid();
  renderQuestion();
}

function navigate(dir) {
  const next = state.current + dir;
  if (next < 0) return;
  if (next >= state.questions.length) { showSummary(); return; }
  state.current = next;
  renderQuestion();
  renderGrid();
}

function goTo(i) {
  state.current = i;
  renderQuestion();
  renderGrid();
  document.getElementById('q-card').scrollIntoView({ behavior: 'smooth' });
}

function submitAnswer() {
  const idx = state.current;
  const q = state.questions[idx];
  if (state.revealed[idx]) return;
  if (!state.answers[idx]) { alert('Please select an answer first.'); return; }
  state.revealed[idx] = true;
  renderQuestion();
  renderGrid();
}

function selectAnswer(letter) {
  const idx = state.current;
  if (state.revealed[idx]) return;
  state.answers[idx] = letter;
  renderQuestion();
}

function renderQuestion() {
  const idx = state.current;
  const q = state.questions[idx];
  const answered = state.answers[idx];
  const revealed = state.revealed[idx];

  // Update meta
  document.getElementById('q-num').textContent = `Q#${q.num}`;
  document.getElementById('q-text').textContent = q.question;

  // Update options
  const optEl = document.getElementById('options');
  optEl.innerHTML = '';

  const letters = Object.keys(q.options);
  letters.forEach(letter => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<div class="opt-letter">${letter}</div><div class="opt-text">${q.options[letter]}</div>`;

    const isCorrect = q.correct.includes(letter);
    const isSelected = answered === letter;

    if (revealed) {
      div.classList.add('disabled');
      if (isSelected && isCorrect) div.classList.add('correct');
      else if (isSelected && !isCorrect) div.classList.add('incorrect');
      else if (isCorrect) div.classList.add('show-correct');
    } else {
      if (isSelected) div.classList.add('selected');
      if (state.mode === 'study') {
        if (isCorrect) div.classList.add('show-correct');
      }
      div.addEventListener('click', () => selectAnswer(letter));
    }

    optEl.appendChild(div);
  });

  // Feedback
  const fb = document.getElementById('feedback');
  const fbTitle = document.getElementById('fb-title');
  const fbBody = document.getElementById('fb-body');

  if (revealed) {
    const correct = q.correct.includes(answered);
    fb.className = `feedback show ${correct ? 'correct' : 'incorrect'}`;
    fbTitle.textContent = correct ? '✓ Correct!' : '✗ Incorrect';
    fbBody.textContent = correct
      ? `Great job! "${letter}" is the right answer.`
      : `The correct answer is ${q.correct}. Review this topic before your exam.`;
  } else {
    fb.className = 'feedback';
  }

  // Submit button
  const btnSubmit = document.getElementById('btn-submit');
  if (state.mode === 'study' || revealed) {
    btnSubmit.style.display = 'none';
  } else {
    btnSubmit.style.display = '';
  }

  // Progress
  const total = state.questions.length;
  const done = Object.keys(state.revealed).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('prog-label').innerHTML = `Question <b>${idx + 1}</b> of ${total}`;
  document.getElementById('prog-pct').textContent = `${pct}% complete`;
  document.getElementById('prog-fill').style.width = `${pct}%`;

  // Nav buttons
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').textContent = idx === total - 1 ? 'Finish →' : 'Next →';

  // Header stats
  const correct = Object.keys(state.revealed).filter(i => {
    const qi = state.questions[i];
    return qi.correct.includes(state.answers[i]);
  }).length;
  const wrong = Object.keys(state.revealed).length - correct;
  document.getElementById('hdr-score').textContent = `${correct}/${Object.keys(state.revealed).length}`;
  document.getElementById('hdr-acc').textContent = done > 0 ? `${Math.round((correct / done) * 100)}%` : '—';

  // Hide summary, show card
  document.getElementById('q-card').style.display = '';
  document.getElementById('summary').classList.remove('show');
}

function renderGrid() {
  const grid = document.getElementById('q-grid');
  grid.innerHTML = '';
  state.questions.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-dot';
    btn.textContent = q.num;
    btn.title = `Q${q.num}`;
    if (i === state.current) btn.classList.add('current');
    else if (state.revealed[i]) {
      const correct = q.correct.includes(state.answers[i]);
      btn.classList.add(correct ? 'answered' : 'wrong');
    }
    btn.addEventListener('click', () => goTo(i));
    grid.appendChild(btn);
  });
}

function showSummary() {
  const total = state.questions.length;
  const answered = Object.keys(state.revealed).length;
  const correct = Object.keys(state.revealed).filter(i => {
    return state.questions[i].correct.includes(state.answers[i]);
  }).length;
  const wrong = answered - correct;
  const skipped = total - answered;
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  const pctDeg = (pct / 100) * 360;

  document.getElementById('q-card').style.display = 'none';
  const sum = document.getElementById('summary');
  sum.classList.add('show');

  document.getElementById('score-pct').textContent = `${pct}%`;
  document.getElementById('score-circle').style.setProperty('--pct', `${pctDeg}deg`);
  document.getElementById('sum-correct').textContent = correct;
  document.getElementById('sum-wrong').textContent = wrong;
  document.getElementById('sum-skip').textContent = skipped;

  const pass = pct >= 70;
  document.getElementById('sum-title').textContent = pass ? '🎉 Congratulations!' : '📚 Keep Studying!';
  document.getElementById('sum-sub').textContent = pass
    ? `You scored ${pct}% — above the 70% passing threshold. You're on track for the exam!`
    : `You scored ${pct}% — the passing score is 70%. Review the missed questions and try again.`;
}

function restartQuiz() {
  state.current = 0;
  state.answers = {};
  state.revealed = {};
  document.getElementById('summary').classList.remove('show');
  renderGrid();
  renderQuestion();
}

// Init
renderGrid();
renderQuestion();
</script>
</body>
</html>
